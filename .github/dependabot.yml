version: 2
updates:
  # Tracks the nginx base image pinned in Dockerfile (FROM nginx:1.31.2-alpine)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
    labels:
      - "dependencies"
      - "docker"
 
  # Tracks the action versions pinned in .github/workflows/docker-publish.yml
  # (actions/checkout, docker/setup-qemu-action, docker/setup-buildx-action,
  # docker/login-action, docker/build-push-action)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
    labels:
      - "dependencies"
      - "github-actions"
 
