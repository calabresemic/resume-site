server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — the kind of thing a WordPress plugin would
    # normally fight you on. Here it's just config.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets aggressively; index.html stays revalidated
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    error_page 404 /index.html;
}